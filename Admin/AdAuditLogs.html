<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Audit Logs</title>
    <link rel="stylesheet" href="Global.css">
    <link rel="stylesheet" href="AdHome.css"> <link rel="stylesheet" href="AdAuditLogs.css"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="ReLogo.png" alt="ReFoundly Logo" class="sidebar-logo-img">
                <span>ReFoundly- Admin</span>
            </div>
            <nav>
                <a href="AdHome.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="AdAnalytics.html"><i class="fa-solid fa-chart-pie"></i> Analytics</a>
                <a href="AdReport.html"><i class="fa-solid fa-file-invoice"></i> Manage Reports</a>
                <a href="AdUsers.html"><i class="fa-solid fa-users"></i> Users</a>
                <a href="AdAuditLogs.html" class="active"><i class="fa-solid fa-shield-alt"></i> Audit Logs</a>
            </nav>
            <div class="sidebar-footer">
                <hr>
                <a href="AdLogin.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="admin-controls">
                    <span>Admin</span>
                    <div class="notif-wrapper">
                       <i class="fa-solid fa-bell" id="notifBell" style="cursor: pointer; font-size: 1.2rem;"></i>
                        <span id="notifBadge" class="notif-badge">0</span>
                        <div id="notifDropdown" class="notif-dropdown">
                            <div class="notif-header">
                                <span>Notifications</span>
                              <span class="clear-notifs" id="clearNotifsBtn">Clear All</span>
                            </div>
                            <div id="notifList">
                                <div style="padding: 20px; text-align: center; color: #999;">No new notifications</div>
                            </div>
                        </div>
                    </div>
                    <a href="AdAccount.html" class="avatar-link"><div class="user-avatar"></div></a>
                </div>
            </header>

            <section class="content-wrapper" id="audit-wrapper">
                <h1 style="font-family: 'Montserrat', sans-serif;">Security Audit Logs</h1>
                <div class="audit-table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Timestamp</th>
                                <th>User / Admin</th>
                                <th>Action</th>
                                <th>Details</th>
                                <th>Blockchain Proof</th> 
                                <th>IP Address</th>
                            </tr>
                        </thead>
                        <tbody id="audit-log-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="AdAuditLogs.js"></script>
</body>
</html>
