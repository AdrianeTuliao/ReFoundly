<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ReFoundly Chatbot Pro</title>
    <style>
        :root {
            --primary: #6B9E45;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        /* [MITIGATION 8 & ECHO EFFECT] */
        @keyframes echo {
            0% { box-shadow: 0 0 0 0 rgba(107, 158, 69, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(107, 158, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(107, 158, 69, 0); }
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); }
            20% { transform: translateY(-6px); }
        }

        /* FLOATING CIRCLE - DRAGGABLE & STYLED */
        #chatbot-launcher {
            width: 80px; 
            height: 80px; 
            border-radius: 50%;
            background-color: var(--primary);
            border: 2px solid #e0e0e0;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            position: fixed; 
            bottom: 30px;
            right: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
            z-index: 1002;
            animation: echo 2s infinite; 
        }

        #chatbot-launcher:active {
            cursor: grabbing;
        }

        #chatbot-launcher img {
            width: 130%;
            height: auto;
            pointer-events: none; 
        }

        #chatbot-launcher:hover {
            transform: scale(1.1);
        }

        /* CHAT WINDOW */
        #chatbot-container {
            font-size: 16px;
            position: fixed; 
            bottom: 120px; 
            right: 30px;
            width: 350px; 
            height: 520px; 
            background: var(--white);
            display: none; 
            flex-direction: column;
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 1001; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif;
        }

        .chat-header { background: var(--primary); color: white; padding: 20px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        
        /* BUBBLES */
        .msg { padding: 10px 15px; border-radius: 15px; font-size: 14px; max-width: 80%; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px;}
        .bot-msg { align-self: flex-start; background: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px;}

        /* TYPING BUBBLE */
        .typing {
            font-size: 14px;
            align-self: flex-start;
            background: #e2e8f0;
            padding: 12px 15px;
            border-radius: 15px;
            border-bottom-left-radius: 4px;
            display: flex;
            gap: 4px;
            align-items: center;
        }
        .dot {
            width: 6px; height: 6px;
            background: #94a3b8;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        /* QUICK REPLIES */
        .quick-replies { padding: 10px; display: flex; gap: 8px; overflow-x: auto; background: white; border-top: 1px solid #eee; font-size: 14px; }
        .reply-btn { 
            background: white; border: 1px solid var(--primary); color: var(--primary);
            padding: 5px 12px; border-radius: 15px; font-size: 12px; cursor: pointer; white-space: nowrap;
        }
        .reply-btn:hover { background: var(--primary); color: white; }

        .input-area { padding: 15px; display: flex; gap: 8px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 20px; outline: none; }
    </style>
</head>
<body>

    <div id="chatbot-container">
        <div class="chat-header">
            <span>ReFoundly Assistant</span>
            <button onclick="toggleChat()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
        </div>
        <div id="chat-messages"></div>
        
        <div class="quick-replies">
            <button class="reply-btn" onclick="quickSend('How to report lost/found items?')">Report Lost/Found</button>
            <button class="reply-btn" onclick="quickSend('I lost an item')">Lost an item</button>
            <button class="reply-btn" onclick="quickSend('I cant find my item')">Find item</button>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type a message...">
            <button onclick="sendMessage()" style="background:var(--primary); color:white; border:none; width:35px; height:35px; border-radius:50%; cursor:pointer;">➤</button>
        </div>
    </div>

    <button id="chatbot-launcher">
         <img src="wht_logo.png" alt="ReFoundly Logo">
    </button>

    <script>
        const launcher = document.getElementById('chatbot-launcher');
        const container = document.getElementById('chatbot-container');
        const box = document.getElementById('chat-messages');
        let isDragging = false;
        let startX, startY, initX, initY;

        // --- SECURITY HELPER ---
        // Mitigation 2 (Frontend): Use textContent to prevent DOM-based XSS
        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${className}`;
            msgDiv.textContent = text; // Safe: browser treats text as data, not code
            box.appendChild(msgDiv);
            box.scrollTop = box.scrollHeight;
        }

        launcher.addEventListener('mousedown', (e) => {
            isDragging = false;
            startX = e.clientX; 
            startY = e.clientY;
            
            const rect = launcher.getBoundingClientRect();
            initX = rect.left;
            initY = rect.top;

            const move = (me) => {
                const dx = me.clientX - startX;
                const dy = me.clientY - startY;

                if (Math.abs(dx) > 5 || Math.abs(dy) > 5) {
                    isDragging = true;
                    launcher.style.left = (initX + dx) + 'px';
                    launcher.style.top = (initY + dy) + 'px';
                    launcher.style.bottom = 'auto';
                    launcher.style.right = 'auto';

                    container.style.left = (initX + dx - 270) + 'px';
                    container.style.top = (initY + dy - 530) + 'px';
                    container.style.bottom = 'auto';
                    container.style.right = 'auto';
                }
            };

            const up = () => {
                document.removeEventListener('mousemove', move);
                document.removeEventListener('mouseup', up);
                if (!isDragging) toggleChat();
            };
            document.addEventListener('mousemove', move);
            document.addEventListener('mouseup', up);
        });

        function toggleChat() {
            container.style.display = (container.style.display === 'flex') ? 'none' : 'flex';
        }

        function quickSend(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const userText = input.value.trim();
            if (!userText) return;

            // [SECURE APPEND]
            appendMessage(userText, 'user-msg');
            input.value = '';

            // TYPING INDICATOR
            const typingId = "typing-" + Date.now();
            const typingDiv = document.createElement('div');
            typingDiv.id = typingId;
            typingDiv.className = 'typing';
            typingDiv.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
            box.appendChild(typingDiv);
            box.scrollTop = box.scrollHeight;

            try {
                const res = await fetch('http://127.0.0.1:5000/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: userText})
                });
                const data = await res.json();

                setTimeout(() => {
                    const typingElem = document.getElementById(typingId);
                    if (typingElem) typingElem.remove();
                    // [SECURE APPEND BOT REPLY]
                    appendMessage(data.response, 'bot-msg');
                }, 800);

            } catch {
                const typingElem = document.getElementById(typingId);
                if (typingElem) typingElem.remove();
                appendMessage("Server Offline! Please check your Flask terminal.", 'bot-msg');
                const lastMsg = box.lastElementChild;
                if(lastMsg) lastMsg.style.color = "red";
            }
        }

        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
